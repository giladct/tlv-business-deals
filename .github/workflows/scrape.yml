name: Daily Flight Scrape

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC = 8am Jerusalem time
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv and install dependencies
        run: |
          uv venv .venv --python 3.12
          uv pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: .venv/bin/playwright install chromium --with-deps

      - name: Run scraper
        run: .venv/bin/python scraper.py
        env:
          CI: "true"

      - name: Commit updated flight data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flights.json
          git diff --staged --quiet || git commit -m "chore: flight prices $(date -u +%Y-%m-%d)"
          git push
